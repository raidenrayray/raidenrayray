<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="ui-monospace,'SF Mono','JetBrains Mono','Fira Code',Menlo,monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="30%" stop-color="#4a1f5c"/>
      <stop offset="60%" stop-color="#c44569"/>
      <stop offset="85%" stop-color="#ffb6c1"/>
      <stop offset="100%" stop-color="#ffd6e0"/>
    </linearGradient>

    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff5f8" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#ffd6e0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd6e0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sunHaze" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffd6e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd6e0" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="50%" stop-color="#c44569"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="1200" height="300" fill="url(#sky)"/>

  <!-- haze around moon -->
  <ellipse cx="970" cy="90" rx="200" ry="80" fill="url(#sunHaze)"/>

  <!-- mountains, layered for depth -->
  <path d="M 0,210 L 80,170 L 160,190 L 240,150 L 340,180 L 440,160 L 540,185 L 640,155 L 740,175 L 840,165 L 940,185 L 1040,160 L 1140,180 L 1200,170 L 1200,300 L 0,300 Z"
        fill="#3d1f4f" opacity="0.5"/>
  <path d="M 0,235 L 100,205 L 200,225 L 320,200 L 440,220 L 560,205 L 680,225 L 800,205 L 920,220 L 1040,200 L 1160,220 L 1200,210 L 1200,300 L 0,300 Z"
        fill="#251238" opacity="0.7"/>
  <path d="M 0,260 L 100,245 L 220,255 L 340,240 L 460,255 L 580,245 L 700,258 L 820,245 L 940,255 L 1060,243 L 1180,255 L 1200,250 L 1200,300 L 0,300 Z"
        fill="#0f0820" opacity="0.85"/>

  <!-- moon -->
  <circle cx="970" cy="85" r="58" fill="url(#moonGlow)"/>
  <circle cx="970" cy="85" r="40" fill="#fff5f8" opacity="0.95"/>
  <circle cx="958" cy="78" r="6" fill="#ffd6e0" opacity="0.5"/>
  <circle cx="982" cy="92" r="4" fill="#ffd6e0" opacity="0.5"/>
  <circle cx="975" cy="72" r="3" fill="#ffd6e0" opacity="0.4"/>
  <circle cx="965" cy="98" r="3.5" fill="#ffd6e0" opacity="0.4"/>

  <!-- stars -->
  <g fill="#fff5f8">
    <circle cx="120" cy="40" r="1.2" opacity="0.9"/>
    <circle cx="280" cy="25" r="0.8" opacity="0.7"/>
    <circle cx="450" cy="55" r="1" opacity="0.8"/>
    <circle cx="620" cy="30" r="1.3" opacity="0.9"/>
    <circle cx="780" cy="50" r="0.7" opacity="0.6"/>
    <circle cx="1100" cy="35" r="1" opacity="0.8"/>
    <circle cx="1150" cy="80" r="0.9" opacity="0.7"/>
    <circle cx="50" cy="90" r="0.8" opacity="0.7"/>
    <circle cx="350" cy="80" r="0.6" opacity="0.6"/>
    <circle cx="850" cy="20" r="1" opacity="0.85"/>
    <circle cx="180" cy="65" r="0.7" opacity="0.6"/>
  </g>

  <!-- top scanline -->
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#ff6b9d" stroke-width="0.5" opacity="0.3"/>

  <!-- terminal prompt -->
  <text x="40" y="35" fill="#ffb6c1" font-size="12" opacity="0.85">~/raiden $ ./hello.exe</text>

  <!-- main title -->
  <text x="40" y="155" fill="#fff5f8" font-size="82" font-weight="700" letter-spacing="-2" filter="url(#softGlow)">raiden<tspan fill="#ff6b9d">.</tspan>fyi</text>

  <!-- tagline -->
  <text x="44" y="200" fill="#ffd6e0" font-size="22" letter-spacing="1.5">
    homelab <tspan fill="#ff6b9d">/</tspan> sysadmin <tspan fill="#a855f7">/</tspan> networking <tspan fill="#08d9d6">/</tspan> devops
  </text>

  <!-- bottom status -->
  <text x="40" y="265" fill="#ffd6e0" font-size="11" opacity="0.85">[ uk ] :: [ unraid ] :: [ proxmox ] :: [ fortinet ] :: [ itil ]</text>
  <text x="640" y="265" fill="#08d9d6" font-size="11" opacity="0.9" filter="url(#softGlow)">♡ status: online</text>

  <!-- accent bar -->
  <rect x="0" y="295" width="1200" height="5" fill="url(#accent)"/>
</svg>
